<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: rgba(0,0,0,0.4);
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin-bottom: 10px;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
    cursor: pointer;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
    flex: 1;
    padding: 25px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 25px;
}

.header h1 {
    font-size: 24px;
}

.report-btn {
    background: #00c6ff;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 12px;
    backdrop-filter: blur(8px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    margin-top: 10px;
}

.card p {
    font-size: 14px;
    color: #ccc;
}

.status {
    margin-top: 10px;
    font-weight: bold;
}

.missing { color: #ffcc00; }
.wanted { color: #ff4b2b; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MWPRS</h2>

    <a onclick="goToDashboard()">🏠 Dashboard</a>
    <a onclick="goToReports()">📄 My Reports</a>
    <a onclick="goToForm()">➕ Report Case</a>
    <a onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Active Cases</h1>
        <button class="report-btn" onclick="goToForm()">+ New Report</button>
    </div>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <h3>Rahul Sharma</h3>
            <p>Age: 25</p>
            <p>Last Seen: Hyderabad</p>
            <div class="status missing">Missing</div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300">
            <h3>Amit Verma</h3>
            <p>Age: 30</p>
            <p>Last Seen: Delhi</p>
            <div class="status wanted">Wanted</div>
        </div>

    </div>

</div>

<script>
function goToDashboard() {
    window.location.href = "dashboard.html";
}

function goToForm() {
    window.location.href = "form.html";
}

function goToReports() {
    window.location.href = "my-reports.html";
}

function logout() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
