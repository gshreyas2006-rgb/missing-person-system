<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

/* 🌌 SAME THEME */
body {
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.header h1 {
    font-size: 26px;
}

.logout {
    background: #ff4b2b;
    padding: 8px 12px;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
}

.card h3 {
    margin-top: 10px;
}

.card p {
    font-size: 14px;
    color: #ccc;
}

/* STATUS */
.status {
    margin-top: 10px;
    font-weight: bold;
}

.pending {
    color: #ffcc00;
}

.approved {
    color: #00ff9f;
}

.rejected {
    color: #ff4b2b;
}

/* BUTTONS */
.actions {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.approve {
    flex: 1;
    background: #00c851;
    border: none;
    padding: 8px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.reject {
    flex: 1;
    background: #ff4444;
    border: none;
    padding: 8px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <h1>Admin Dashboard</h1>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- DYNAMIC GRID -->
<div class="grid" id="adminContainer"></div>

<script>
function logout() {
    window.location.href = "admin-login.html";
}

// LOAD REPORTS FROM localStorage
let reports = JSON.parse(localStorage.getItem("reports")) || [];
let container = document.getElementById("adminContainer");

function displayReports() {
    container.innerHTML = "";

    if (reports.length === 0) {
        container.innerHTML = "<p>No reports available</p>";
        return;
    }

    reports.forEach((report, index) => {

        let statusClass = "pending";
        if (report.status === "Approved") statusClass = "approved";
        if (report.status === "Rejected") statusClass = "rejected";

        container.innerHTML += `
            <div class="card">
                <img src="${report.image}">
                <h3>${report.name}</h3>
                <p>Age: ${report.age}</p>
                <p>Last Seen: ${report.location}</p>
                <p>Type: ${report.type}</p>

                <div class="status ${statusClass}">
                    ${report.status}
                </div>

                <div class="actions">
                    <button class="approve" onclick="approve(${index})">Approve</button>
                    <button class="reject" onclick="reject(${index})">Reject</button>
                </div>
            </div>
        `;
    });
}

// APPROVE
function approve(index) {
    reports[index].status = "Approved";
    localStorage.setItem("reports", JSON.stringify(reports));
    displayReports();
}

// REJECT
function reject(index) {
    reports[index].status = "Rejected";
    localStorage.setItem("reports", JSON.stringify(reports));
    displayReports();
}

// INITIAL LOAD
displayReports();
</script>

</body>
</html>
