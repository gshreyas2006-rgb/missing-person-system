<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* (same CSS as your file — no change) */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

body {
    height: 100vh;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    display: flex;
    color: white;
}

.container { display: flex; width: 100%; }

.left {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.content { text-align: center; }

.content h1 { font-size: 36px; }

.content p { opacity: 0.8; }

.right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 360px;
    padding: 30px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    text-align: center;
}

.input-group { position: relative; margin-bottom: 20px; }

.input-group input {
    width: 100%;
    padding: 12px 40px 12px 10px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: transparent;
    color: white;
}

.input-group label {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #ccc;
    transition: 0.3s;
}

.input-group input:focus + label,
.input-group input:valid + label {
    top: -8px;
    font-size: 12px;
    color: #ff4b2b;
}

.input-group i {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
}

.toggle { right: 35px; cursor: pointer; }

button {
    width: 100%;
    padding: 12px;
    background: #ff4b2b;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

button:hover { background: #ff2e0f; }

.link { margin-top: 10px; }

.link a { color: #00c6ff; }

.error { font-size: 13px; }
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <div class="content">
            <h1>Welcome Back</h1>
            <p>Login to continue and manage reports.</p>
        </div>
    </div>

    <div class="right">
        <div class="card">

            <h2>Login</h2>

            <form onsubmit="return loginUser()">

                <div class="input-group">
                    <input type="text" id="user" required>
                    <label>Username / Phone</label>
                    <i class="fa fa-user"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="pass" required>
                    <label>Password</label>
                    <i class="fa fa-lock"></i>
                    <i class="fa fa-eye toggle" onclick="togglePassword()"></i>
                </div>

                <p id="msg" class="error"></p>

                <button type="submit">Login</button>

            </form>

            <p class="link">
                Don’t have an account?
                <a href="register.html">Register</a>
            </p>

        </div>
    </div>

</div>

<script>
function togglePassword() {
    let field = document.getElementById("pass");
    field.type = field.type === "password" ? "text" : "password";
}

function loginUser() {
    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;

    // SIMPLE DEMO LOGIN
    if (username === "user" && password === "1234") {
        document.getElementById("msg").style.color = "lightgreen";
        document.getElementById("msg").innerText = "Login successful!";

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 800);
    } else {
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Invalid credentials";
    }

    return false;
}
</script>

</body>
</html>
