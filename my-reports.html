<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reports</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

body {
    background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.header {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.back {
    background:#00c6ff;
    padding:8px 12px;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
}

.card {
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:12px;
    padding:15px;
}

.card img {
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:8px;
}

.status { margin-top:10px; font-weight:bold; }
.pending { color:#ffcc00; }
.approved { color:#00ff9f; }
.rejected { color:#ff4b2b; }
</style>
</head>

<body>

<div class="header">
    <h1>My Reports</h1>
    <button class="back" onclick="goBack()">← Back</button>
</div>

<div class="grid" id="reportsContainer"></div>

<script>
function goBack(){
    window.location.href = "dashboard.html";
}

// LOAD REPORTS
let reports = JSON.parse(localStorage.getItem("reports")) || [];
let container = document.getElementById("reportsContainer");

if(reports.length === 0){
    container.innerHTML = "<p>No reports submitted yet</p>";
} else {

    reports.forEach(report => {

        let statusClass = "pending";
        if(report.status === "Approved") statusClass = "approved";
        if(report.status === "Rejected") statusClass = "rejected";

        container.innerHTML += `
            <div class="card">
                <img src="${report.image}">
                <h3>${report.name}</h3>
                <p>Age: ${report.age}</p>
                <p>Location: ${report.location}</p>
                <p>Type: ${report.type}</p>
                <div class="status ${statusClass}">
                    ${report.status}
                </div>
            </div>
        `;
    });
}
</script>

</body>
</html>
